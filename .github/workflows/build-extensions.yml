name: Extensions

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - master
      - "[0-9]+.[0-9]+.x"
    paths:
      - ".github/extensions.paths-filter.yml"
      - ".github/workflows/build-extensions.yml"
      - ".github/workflows/matrix-extensions.json"
      - ".github/workflows/reusable-build-extensions**"
      - ".github/workflows/reusable-call-linter.yml"
      - "include/api/wasmedge/wasmedge_tools.h"
      - "include/driver/wasi_nn_rpc/**"
      - "include/driver/wasiNNRPCServerTool.h"
      - "lib/CMakeLists.txt"
      - "lib/api/CMakeLists.txt"
      - "lib/api/wasmedge.cpp"
      - "lib/driver/CMakeLists.txt"
      - "lib/driver/wasiNNRPCServerTool.cpp"
      - "lib/wasi_nn_rpc/**"
      - "plugins/**"
      - "test/plugins/**"
      - "thirdparty/**"
      - "tools/**"
      - "CMakeLists.txt"
      - "cmake/**"
  pull_request:
    branches:
      - master
      - "proposal/**"
      - "[0-9]+.[0-9]+.x"
    paths:
      - ".github/extensions.paths-filter.yml"
      - ".github/workflows/build-extensions.yml"
      - ".github/workflows/matrix-extensions.json"
      - ".github/workflows/reusable-build-extensions**"
      - ".github/workflows/reusable-call-linter.yml"
      - "include/api/wasmedge/wasmedge_tools.h"
      - "include/driver/wasi_nn_rpc/**"
      - "include/driver/wasiNNRPCServerTool.h"
      - "lib/CMakeLists.txt"
      - "lib/api/CMakeLists.txt"
      - "lib/api/wasmedge.cpp"
      - "lib/driver/CMakeLists.txt"
      - "lib/driver/wasiNNRPCServerTool.cpp"
      - "lib/wasi_nn_rpc/**"
      - "plugins/**"
      - "test/plugins/**"
      - "thirdparty/**"
      - "tools/**"
      - "CMakeLists.txt"
      - "cmake/**"

permissions:
  contents: read

jobs:
  # TODO: Refactor `lint` with `on.workflow_run`
  # https://docs.github.com/en/actions/using-workflows/triggering-a-workflow
  lint:
    uses: ./.github/workflows/reusable-call-linter.yml

  get_version:
    name: Retrieve version information
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.prep.outputs.version }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Ensure git safe directory
        run: |
          git config --global --add safe.directory $(pwd)
      - name: Get version
        id: prep
        run: |
          # Retrieve annotated tags. Details: https://github.com/actions/checkout/issues/290
          git fetch --tags --force
          echo "Set version: $(git describe --match "[0-9].[0-9]*" --tag)"
          echo "version=$(git describe --match '[0-9].[0-9]*' --tag)" >> $GITHUB_OUTPUT

  filter:
    name: Filter changed paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # Required by dorny/paths-filter on pull_request events
    outputs:
      all: ${{ steps.filter.outputs.all }}
      shared_cmake: ${{ steps.filter.outputs.shared_cmake }}
      wasi_nn: ${{ steps.filter.outputs.wasi_nn }}
      wasi_nn_rpc: ${{ steps.filter.outputs.wasi_nn_rpc }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: '.github/extensions.paths-filter.yml'

  test_wasi_nn_ggml_rpc:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: g++
            docker_tag: ubuntu-24.04-build-gcc-plugins-deps
            build_type: Release
          - name: clang++
            docker_tag: ubuntu-24.04-build-clang-plugins-deps
            build_type: Release
    name: WASI-NN GGML RPC (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [ get_version, filter ]
    if: >-
      ${{ needs.filter.outputs.all == 'true'
       || needs.filter.outputs.shared_cmake == 'true'
       || needs.filter.outputs.wasi_nn == 'true'
       || needs.filter.outputs.wasi_nn_rpc == 'true' }}
    container:
      image: wasmedge/wasmedge:${{ matrix.docker_tag }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Ensure git safe directory
        run: |
          git config --global --add safe.directory $(pwd)
      - name: Test WASI-NN RPC mode with GGML
        shell: bash
        run: |
          set -eux
          # wasi_nn_rpcserver is built in a clean "build_rpc" dir
          export nnrpc_test_dir=build_rpc/test/plugins/wasi_nn
          cmake -Bbuild_rpc -GNinja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DWASMEDGE_BUILD_TESTS=ON \
            -DWASMEDGE_USE_LLVM=OFF \
            -DWASMEDGE_BUILD_TOOLS=ON \
            -DWASMEDGE_PLUGIN_WASI_NN_BACKEND=GGML \
            -DWASMEDGE_BUILD_WASI_NN_RPC=ON
          cmake --build build_rpc
          export test_bin=wasiNNTests
          export WASI_NN_RPC_TEST_URI=unix:///tmp/wasi_nn_rpc.sock
          export WASMEDGE_PLUGIN_PATH=build_rpc/plugins/wasi_nn
          build_rpc/tools/wasmedge/wasi_nn_rpcserver \
            --nn-rpc-uri $WASI_NN_RPC_TEST_URI \
            --nn-preload default:GGML:AUTO:build_rpc/test/plugins/wasi_nn/wasinn_ggml_fixtures/orca_mini.gguf &
          RPC_SERVER_PID=$!
          sleep 3
          # The test binary consumes $WASI_NN_RPC_TEST_URI
          (cd ${nnrpc_test_dir} && ./${test_bin} --gtest_filter=WasiNNTest.GGMLBackendWithRPC)
          kill -9 "$RPC_SERVER_PID"

          # Restart the server for the compute single test
          build_rpc/tools/wasmedge/wasi_nn_rpcserver \
            --nn-rpc-uri $WASI_NN_RPC_TEST_URI \
            --nn-preload default:GGML:AUTO:build_rpc/test/plugins/wasi_nn/wasinn_ggml_fixtures/orca_mini.gguf &
          RPC_SERVER_PID=$!
          sleep 3
          (cd ${nnrpc_test_dir} && ./${test_bin} --gtest_filter=WasiNNTest.GGMLBackendComputeSingleWithRPC)
          kill -9 "$RPC_SERVER_PID"

  build_windows_wasi_nn:
    permissions:
      contents: write
    name: WASI-NN (Windows Server 2025)
    runs-on: windows-2025
    env:
      output_dir: build/plugins/wasi_nn
      test_dir: build/test/plugins/wasi_nn
      tar_names: wasi_nn-ggml
      test_bin: wasiNNTests
      output_bin: wasmedgePluginWasiNN.dll
    needs: [ get_version, filter ]
    if: >-
      ${{ needs.filter.outputs.all == 'true'
       || needs.filter.outputs.shared_cmake == 'true'
       || needs.filter.outputs.wasi_nn == 'true' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Ensure git safe directory
        run: |
          git config --global --add safe.directory $(pwd)
      - uses: GuillaumeFalourd/setup-windows10-sdk-action@d4f23d08ae372a72e47dc2616c9ec8c951f853ec # v2.5
        with:
          sdk-version: 26100
      - name: Cache LLVM
        id: llvm-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: LLVM-21.1.3-win64-MultiThreadedDLL
          key: llvm-21.1.3-windows-2025
      - name: Download and Extract LLVM
        if: steps.llvm-cache.outputs.cache-hit != 'true'
        run: |
          $uri = "https://github.com/WasmEdge/llvm-windows/releases/download/llvmorg-21.1.3/LLVM-21.1.3-win64-MultiThreadedDLL.zip"
          $llvm = "LLVM-21.1.3-win64-MultiThreadedDLL.zip"
          Invoke-WebRequest -Uri $uri -HttpVersion 2.0 -OutFile $llvm
          Expand-Archive -Path $llvm
          Remove-Item -Path $llvm
      - name: Build WasmEdge
        run: |
          $vsPath = (vswhere -latest -property installationPath)
          Import-Module (Join-Path $vsPath "Common7\Tools\Microsoft.VisualStudio.DevShell.dll")
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64 -winsdk=10.0.26100.0"
          $llvm_dir = "$pwd\LLVM-21.1.3-win64-MultiThreadedDLL\LLVM-21.1.3-win64\lib\cmake\llvm"
          $Env:CC = "$pwd\LLVM-21.1.3-win64-MultiThreadedDLL\LLVM-21.1.3-win64\bin\clang-cl.exe"
          $Env:CXX = "$pwd\LLVM-21.1.3-win64-MultiThreadedDLL\LLVM-21.1.3-win64\bin\clang-cl.exe"
          $llvm_mt = "mt"
          $cmake_sys_version = "10.0.26100.0"
          cmake -Bbuild -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_VERSION="$cmake_sys_version" -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL -DCMAKE_MT="$llvm_mt" -DLLVM_DIR="$llvm_dir" -DWASMEDGE_BUILD_TESTS=ON -DWASMEDGE_USE_LLVM=OFF -DWASMEDGE_BUILD_TOOLS=OFF -DWASMEDGE_PLUGIN_WASI_NN_BACKEND=GGML .

          Write-Output "Building $Env:tar_names backend:"
          cmake --build build --target "$Env:test_bin"

          $Env:PATH += ";$pwd\\build\\lib\\api"
          Write-Output "Testing $Env:tar_names backend:"
          cmake -E chdir "$Env:test_dir" "$Env:test_bin"

          Write-Output "Copying $Env:tar_names backend:"
          Copy-Item "$Env:output_dir/$Env:output_bin" -Destination "./$Env:output_bin"

          Write-Output "Compress-Archive -Path $Env:output_bin -DestinationPath plugin_${Env:tar_names}.zip -CompressionLevel Optimal"
          Compress-Archive -Path "$Env:output_bin" -DestinationPath "plugin_${Env:tar_names}.zip" -CompressionLevel Optimal
          ls "plugin_${Env:tar_names}.zip"
      - name: Upload artifact - wasi_nn-ggml
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: WasmEdge-plugin-wasi_nn-ggml-${{ needs.get_version.outputs.version }}-windows.zip
          path: plugin_wasi_nn-ggml.zip

  build_plugins:
    permissions:
      contents: write
    name: Plugins
    needs: get_version
    uses: ./.github/workflows/reusable-build-extensions.yml
    with:
      version: ${{ needs.get_version.outputs.version }}
