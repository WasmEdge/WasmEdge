name: Build extensions on macOS

on:
  workflow_call:
    inputs:
      runner:
        type: string
        required: true
      asset_tag:
        type: string
        required: true
      plugins:
        description: 'JSON array of the plugins'
        type: string
        required: true
      version:
        type: string
        required: true
      release:
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    if: ${{ inputs.plugins != '[]' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.plugins) }}
    name: ${{ matrix.plugin }} (${{ inputs.asset_tag }})
    runs-on: ${{ inputs.runner }}
    env:
      bin_name: ${{ matrix.bin }}.dylib
      # Set value to `matrix.target` if `input.release` is `true`, or
      # if `matrix.testBin` is empty
      target: ${{ inputs.release && matrix.target || matrix.testBin || matrix.target }}
      test_dir: build/test/plugins/${{ matrix.dir }}
      output_dir: build/plugins/${{ matrix.dir }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Cache the ML models downloaded at configure time, keyed per plugin
      # (per backend for wasi_nn, with the bitnet variants sharing one model)
      # so flaky upstream downloads only hit on cache misses. Only the
      # downloaded files are cached, not test byproducts. The same key may
      # appear once per compression toolchain (gzip/zstd) across job images.
      - if: ${{ !inputs.release && (matrix.dir == 'wasi_nn' || matrix.dir == 'wasmedge_stablediffusion') }}
        name: Cache ML model fixtures
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            build/test/plugins/wasi_nn/wasinn_*_fixtures
            build/test/plugins/wasmedge_stablediffusion/stableDiffusion/sd-v1-5-fp16.safetensors
          key: ml-fixtures-${{ matrix.dir == 'wasi_nn' && (contains(matrix.plugin, 'bitnet') && 'wasi_nn-bitnet' || matrix.plugin) || matrix.dir }}-${{ hashFiles(format('test/plugins/{0}/CMakeLists.txt', matrix.dir)) }}
      - name: Build and install dependencies
        shell: bash
        run: |
          brew install ninja opencv rust ffmpeg@7
          brew unlink ffmpeg
      - name: Install dependencies for wasi_nn-piper
        if: matrix.plugin == 'wasi_nn-piper'
        shell: bash
        run: |
          chmod +x utils/build_libpiper.sh
          ./utils/build_libpiper.sh
          echo "PIPER_INSTALL_PATH=$PWD/piper-source/libpiper/install" >> $GITHUB_ENV
      - name: Build ${{ matrix.plugin }}
        shell: bash
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          export PKG_CONFIG_PATH="$(brew --prefix)/opt/ffmpeg@7/lib/pkgconfig:$PKG_CONFIG_PATH"
          export OpenSSL_DIR="$(brew --prefix)/opt/openssl"
          export CC=clang
          export CXX=clang++
          cmake -Bbuild -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPIPER_ROOT="$PIPER_INSTALL_PATH" \
            -DWASMEDGE_BUILD_TESTS=${{ inputs.release && 'OFF' || 'ON' }} \
            -DWASMEDGE_BUILD_TOOLS=OFF \
            -DWASMEDGE_USE_LLVM=OFF \
            -DOPENSSL_ROOT_DIR=${OpenSSL_DIR} \
            ${{ matrix.options }}
          cmake --build build --target ${target}
      - id: var
        run: |
          export prefix="WasmEdge-plugin-${{ matrix.plugin }}"
          export postfix="${{ inputs.version }}-${{ inputs.asset_tag }}"

          echo "artifact=${prefix}-${postfix}.tar.gz" >> $GITHUB_OUTPUT
          echo "artifact_test=${prefix}-no-metal-${postfix}.tar.gz" >> $GITHUB_OUTPUT
          echo "artifacts=${prefix}-*.tar.gz" >> $GITHUB_OUTPUT
      - name: Package ${{ matrix.plugin }}
        shell: bash
        run: |
          cp -f ${output_dir}/${bin_name} ${bin_name}
          if [[ "${{ matrix.plugin }}" == *mlx* ]]; then
            cp -f build/_deps/mlx-build/mlx/backend/metal/kernels/mlx.metallib .
            tar -zcvf ${{ steps.var.outputs.artifact }} \
              ${bin_name} \
              mlx.metallib
          else
            tar -zcvf ${{ steps.var.outputs.artifact }} ${bin_name}
          fi
      - if: ${{ !inputs.release && contains(matrix.plugin, 'stablediffusion') && contains(inputs.asset_tag, 'arm64') }}
        name: Rebuild with METAL=OFF for testing
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Wipe the CMake cache for reconfiguration, but keep the
          # downloaded model fixtures to avoid another multi-GB download.
          rm -rf build/CMakeCache.txt build/CMakeFiles

          cmake -Bbuild -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DWASMEDGE_BUILD_TESTS=ON \
            -DWASMEDGE_BUILD_TOOLS=OFF \
            -DWASMEDGE_USE_LLVM=OFF \
            -DWASMEDGE_PLUGIN_STABLEDIFFUSION_METAL=OFF \
            -DOPENSSL_ROOT_DIR=${OpenSSL_DIR} \
            ${{ matrix.options }}
          cmake --build build --target ${target}

          cp -f ${output_dir}/${bin_name} ${bin_name}
          tar -zcvf ${{ steps.var.outputs.artifact_test }} ${bin_name}
      - if: ${{ !inputs.release }}
        name: Test ${{ matrix.plugin }}
        run: |
          if [[ -z "${{ matrix.testBin }}" ]]; then
            echo "No test specified!"
          else
            cd ${test_dir}
            ./${target}
            cd -
          fi
        shell: bash
      - if: ${{ !inputs.release }}
        name: Upload artifact ${{ matrix.plugin }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.var.outputs.artifact }}
          path: ${{ steps.var.outputs.artifacts }}
      - if: ${{ inputs.release }}
        name: Upload release ${{ steps.var.outputs.artifact }}
        run: |
          gh release upload ${{ inputs.version }} ${{ steps.var.outputs.artifact }} --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
