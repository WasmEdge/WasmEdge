name: Build on Debian

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      release:
        type: boolean
      upload_asset_url:
        type: string

permissions:
  contents: read

jobs:
  build_debian:
    permissions:
      contents: write
    name: Debian Testing
    runs-on: ubuntu-latest
    container:
      image: debian:testing
    env:
      SCCACHE_GHA_ENABLED: "true"
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Install dependency
        run: |
          apt update && apt upgrade -y && \
          apt install -y wget cmake ninja-build curl git dpkg-dev llvm-dev liblld-dev gcc rpm g++
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
        with:
          version: "v0.10.0"
      - name: Warm up sccache server
        run: |
          for i in 1 2 3 4 5; do
            if sccache --show-stats >/dev/null 2>&1; then
              sccache --show-stats
              exit 0
            fi
            echo "sccache server not ready (attempt ${i}/5); retrying..." >&2
            sleep $((i * 3))
          done
          echo "sccache server did not become ready; aborting before the long build" >&2
          exit 1
      - name: Grant the safe directory for git
        run: |
          git config --global --add safe.directory $(pwd)
      - name: Build WasmEdge
        run: |
          cmake -Bbuild -GNinja -DCMAKE_BUILD_TYPE=Release -DWASMEDGE_BUILD_TESTS=ON -DWASMEDGE_BUILD_PACKAGE="TGZ" .
          cmake --build build
      - name: Test WasmEdge
        run: |
          export LD_LIBRARY_PATH="$(pwd)/build/lib/api:$LD_LIBRARY_PATH"
          cd build
          ./tools/wasmedge/wasmedge -v
          ctest --output-on-failure
          cd -
      - name: Create package tarball
        run: |
          cmake --build build --target package
      - name: Upload artifact
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: WasmEdge-${{ inputs.version }}-debian.tar.gz
          path: build/WasmEdge-${{ inputs.version }}-Linux.tar.gz
