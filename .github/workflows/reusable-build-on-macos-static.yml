name: Build on MacOS (static lib)

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      release:
        type: boolean

permissions:
  contents: read

jobs:
  build_on_macos_static:
    permissions:
      contents: write
    name: MacOS 14 (arm64, static lib)
    runs-on: macos-14
    env:
      BUILD_TYPE: Release
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Ensure git safe directory
        run: |
          git config --global --add safe.directory $(pwd)
      - name: Setup build environment
        run: |
          echo "BREW_PREFIX=$(brew --prefix)" >> $GITHUB_ENV
          brew uninstall cmake # conflict with the one used by WasmEdge/llvm/lld
          brew tap WasmEdge/llvm
      - name: Install Homebrew tools
        run: |
          brew install llvm ninja
      - name: Resolve matching lld formula
        id: resolve-lld
        run: |
          LLVM_VERSION=$(brew info --json llvm | jq -r '.[0].versions.stable')
          LLD_VERSION=$(brew info --json WasmEdge/llvm/lld | jq -r '.[0].versions.stable')
          echo "Homebrew LLVM version: ${LLVM_VERSION}"
          echo "WasmEdge/llvm/lld version: ${LLD_VERSION}"
          if [ "${LLVM_VERSION}" = "${LLD_VERSION}" ]; then
            LLD_FORMULA="WasmEdge/llvm/lld"
            LLD_KEG="lld"
            echo "Versions match: ${LLVM_VERSION}"
          else
            OLDER=$(printf '%s\n%s\n' "${LLVM_VERSION}" "${LLD_VERSION}" | sort -V | head -n1)
            if [ "${OLDER}" = "${LLD_VERSION}" ]; then
              echo "Homebrew LLVM (${LLVM_VERSION}) is newer than WasmEdge/llvm/lld (${LLD_VERSION}). Please update the WasmEdge/llvm/lld formula to match."
              exit 1
            fi
            LLD_FORMULA="WasmEdge/llvm/lld@${LLVM_VERSION}"
            LLD_KEG="lld@${LLVM_VERSION}"
            echo "Homebrew LLVM (${LLVM_VERSION}) is older than WasmEdge/llvm/lld (${LLD_VERSION}); pinning to ${LLD_FORMULA}"
          fi
          echo "llvm_version=${LLVM_VERSION}" >> $GITHUB_OUTPUT
          echo "lld_formula=${LLD_FORMULA}" >> $GITHUB_OUTPUT
          echo "lld_keg=${LLD_KEG}" >> $GITHUB_OUTPUT
      - name: Cache lld and cmake
        id: cache-lld
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ${{ env.BREW_PREFIX }}/Cellar/${{ steps.resolve-lld.outputs.lld_keg }}
            ${{ env.BREW_PREFIX }}/Cellar/cmake
          key: homebrew-cellar-lld-${{ runner.os }}-arm64-${{ steps.resolve-lld.outputs.llvm_version }}
          restore-keys: |
            homebrew-cellar-lld-${{ runner.os }}-arm64-${{ steps.resolve-lld.outputs.llvm_version }}
      - name: Install or link lld and cmake
        env:
          LLD_FORMULA: ${{ steps.resolve-lld.outputs.lld_formula }}
          LLD_KEG: ${{ steps.resolve-lld.outputs.lld_keg }}
          CACHE_HIT: ${{ steps.cache-lld.outputs.cache-hit }}
        run: |
          if [ "${CACHE_HIT}" != "true" ]; then
            brew install --build-from-source "${LLD_FORMULA}"
          fi
          brew link "${LLD_KEG}" || true
          brew link cmake || true
      - name: Build WasmEdge (static lib)
        env:
          LLD_KEG: ${{ steps.resolve-lld.outputs.lld_keg }}
        run: |
          export CC=clang
          export CXX=clang++
          rm -rf build output
          mkdir -p output
          cmake -Bbuild -GNinja -DCMAKE_BUILD_TYPE=$BUILD_TYPE \
            -DLLVM_DIR:PATH="$(brew --prefix)/opt/llvm/lib/cmake/llvm" \
            -DLLD_DIR:PATH="$(brew --prefix)/opt/${LLD_KEG}/lib/cmake/lld" \
            -DWASMEDGE_BUILD_STATIC_LIB=ON \
            -DWASMEDGE_BUILD_SHARED_LIB=OFF \
            -DWASMEDGE_LINK_LLVM_STATIC=ON \
            -DWASMEDGE_BUILD_TOOLS=OFF \
            -DWASMEDGE_BUILD_TESTS=OFF \
            -DCMAKE_DISABLE_FIND_PACKAGE_spdlog=ON \
            -DWASMEDGE_BUILD_PACKAGE="TGZ" \
            -DCMAKE_INSTALL_PREFIX:PATH=$GITHUB_WORKSPACE/output .
          cmake --build build
      - name: Verify static archive contents
        run: |
          # libwasmedge.a should exist and be a Mach-O static archive
          ls -la build/lib/api/libwasmedge.a
          file build/lib/api/libwasmedge.a | grep -i "archive"
          # Headers should be installed too
          cmake --install build
          ls output/lib/libwasmedge.a
          ls output/include/wasmedge/wasmedge.h
          # No dylib should be produced
          if find build/lib/api -name "libwasmedge*.dylib" -type f | grep -q .; then
            echo "ERROR: dylib produced despite WASMEDGE_BUILD_SHARED_LIB=OFF"
            exit 1
          fi
          echo "Pass: static archive present, no dylib"
      - name: Create package tarball
        run: |
          cmake --build build --target package
      - name: Upload artifact
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: WasmEdge-${{ inputs.version }}-darwin_arm64_static.tar.gz
          # Glob the CPack output — for non-release runs the cmake-derived version
          # (e.g. git-describe output like "0.17.0-48-g863aed95") may not match
          # `inputs.version`. Only one tarball is produced per run.
          path: build/WasmEdge-*-Darwin.tar.gz
      - name: Upload package tarball
        if: ${{ inputs.release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv build/WasmEdge-${{ inputs.version }}-Darwin.tar.gz WasmEdge-${{ inputs.version }}-darwin_arm64_static.tar.gz
          gh release upload ${{ inputs.version }} WasmEdge-${{ inputs.version }}-darwin_arm64_static.tar.gz --clobber
