name: Build on Ubuntu
defaults:
  run:
    shell: bash -leo pipefail {0}

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      matrix: # [ { name, runner, docker_tag }, ... ]
        type: string
        required: true
      release:
        type: boolean

permissions:
  contents: read

jobs:
  build_on_ubuntu:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.matrix) }}
    name: ${{ matrix.name }} ${{ matrix.arch }} (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ${{ matrix.runner }}
    env:
      BUILD_TESTS: OFF
      SCCACHE_GHA_ENABLED: "true"
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
    container: wasmedge/wasmedge:${{ matrix.docker_tag }}
    steps:
      - name: Install dependencies - non-release
        if: ${{ !inputs.release }}
        run: |
          apt-get update
          apt-get install -y pkg-config protobuf-compiler-grpc libgrpc-dev libgrpc++-dev
      - name: Install dependencies - release
        if: ${{ inputs.release }}
        run: |
          apt-get update
          apt-get install -y pkg-config
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e # v0.0.10
        with:
          version: "v0.10.0"
      - name: Warm up sccache server
        run: |
          for i in 1 2 3 4 5; do
            if sccache --show-stats >/dev/null 2>&1; then
              sccache --show-stats
              exit 0
            fi
            echo "sccache server not ready (attempt ${i}/5); retrying..." >&2
            sleep $((i * 3))
          done
          echo "sccache server did not become ready; aborting before the long build" >&2
          exit 1
      - name: Ensure git safe directory
        run: |
          git config --global --add safe.directory $(pwd)
      - name: Set environment variables for tests
        if: ${{ matrix.tests }}
        run: |
          echo "BUILD_TESTS=ON" | tee -a $GITHUB_ENV
      - name: Grant the safe directory for git
        run: |
          git config --global --add safe.directory $(pwd)
      - name: Build (${{ matrix.compiler }}, ${{ matrix.build_type }})
        if: ${{ !matrix.coverage && !matrix.fuzzing }}
        shell: bash
        env:
          CMAKE_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          if [[ "${{ matrix.compiler }}" == "clang++" ]]; then
            cmake -Bbuild -GNinja -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE -DWASMEDGE_LINK_LLVM_STATIC=ON -DWASMEDGE_BUILD_TESTS=$BUILD_TESTS -DWASMEDGE_BUILD_PACKAGE="TGZ" ${{ matrix.options }} .
          else
            cmake -Bbuild -GNinja -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE -DWASMEDGE_BUILD_TESTS=$BUILD_TESTS -DWASMEDGE_BUILD_PACKAGE="TGZ" ${{ matrix.options }} .
          fi
          cmake --build build
          cmake --build build --target package
      - name: Build fuzzer (${{ matrix.compiler }}, ${{ matrix.build_type }})
        if: ${{ matrix.fuzzing }}
        shell: bash
        env:
          CMAKE_BUILD_TYPE: ${{ matrix.build_type }}
        run: |
          cmake -Bbuild -GNinja -DCMAKE_BUILD_TYPE="$CMAKE_BUILD_TYPE" -DWASMEDGE_LINK_LLVM_STATIC=ON -DWASMEDGE_BUILD_FUZZING=ON -DWASMEDGE_BUILD_TOOLS=OFF .
          cmake --build build --target wasmedge-fuzzpo
          cmake --build build --target wasmedge-fuzztool
          cmake --build build --target wasmedge-fuzzcomponent
      - name: Test
        if: ${{ !matrix.coverage && !matrix.fuzzing && matrix.tests }}
        run: |
          export LD_LIBRARY_PATH="$(pwd)/build/lib/api:$LD_LIBRARY_PATH"
          cd build
          ./tools/wasmedge/wasmedge -v
          ctest
          cd -
      - name: Check symbol exposure
        if: ${{ !matrix.coverage && !matrix.fuzzing }}
        run: |
          bash .github/scripts/check_symbols.sh
      - name: Build (${{ matrix.compiler }}, Coverage)
        if: ${{ matrix.coverage }}
        run: |
          apt update
          apt install -y gcovr
          cmake -Bbuild -GNinja -DCMAKE_BUILD_TYPE=Debug -DWASMEDGE_BUILD_TESTS=ON -DWASMEDGE_BUILD_COVERAGE=ON .
          cmake --build build
          LD_LIBRARY_PATH=$(pwd)/build/lib/api cmake --build build --target codecov
      - name: Upload artifact
        if: ${{ !inputs.release && !matrix.coverage && !matrix.fuzzing }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: WasmEdge-${{ inputs.version }}-${{ matrix.name }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ matrix.arch }}.tar.gz
          path: build/WasmEdge-${{ inputs.version }}-Linux.tar.gz
      - name: Upload package tarball
        if: ${{ inputs.release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          type -p curl >/dev/null || (apt update && apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && apt update \
          && apt install gh -y
          mv build/WasmEdge-${{ inputs.version }}-Linux.tar.gz WasmEdge-${{ inputs.version }}-ubuntu20.04_${{ matrix.arch }}.tar.gz
          gh release upload ${{ inputs.version }} WasmEdge-${{ inputs.version }}-ubuntu20.04_${{ matrix.arch }}.tar.gz --clobber
      - name: Create and upload coverage report to Codecov
        if: ${{ matrix.coverage }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/codecov.xml
          name: codecov-wasmedge
          fail_ci_if_error: true
          verbose: true
