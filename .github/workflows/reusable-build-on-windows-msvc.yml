name: Build on Windows with MSVC

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      release:
        type: boolean

permissions:
  contents: read

jobs:
  build_on_windows:
    permissions:
      contents: write
    name: Build on Windows Server 2025
    runs-on: windows-2025
    env:
      build_tests: ON
      SCCACHE_GHA_ENABLED: "true"
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@1583d6b38d7be47f593cb472781bbb21cab4321e # v0.0.10
        with:
          version: "v0.10.0"
      - name: Warm up sccache server
        run: |
          for ($i = 1; $i -le 5; $i++) {
            sccache --show-stats
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Host "sccache server not ready (attempt $i/5); retrying..."
            Start-Sleep -Seconds ($i * 3)
          }
          Write-Error "sccache server did not become ready; aborting before the long build"
          exit 1
      - name: Cache LLVM for Windows
        id: cache-llvm
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: LLVM-21.1.3-win64-MultiThreadedDLL
          key: llvm-21.1.3-windows-2025-msvc
      - name: Ensure git safe directory
        run: |
          git config --global --add safe.directory $(pwd)
      - name: Install dependency
        uses: crazy-max/ghaction-chocolatey@dfdcf5bba9c0a16358a21c13a06ec5c89024b3ac # v4.1.0
        with:
          args: install --no-progress ninja vswhere
      - name: Install Windows SDK
        uses: GuillaumeFalourd/setup-windows10-sdk-action@d4f23d08ae372a72e47dc2616c9ec8c951f853ec # v2.5
        with:
          sdk-version: 26100
      - name: Set environment variables for release
        if: ${{ inputs.release }}
        run: |
          echo "build_tests=OFF" | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
      - name: Build WasmEdge
        run: |
          $vsPath = (vswhere -latest -property installationPath)
          Import-Module (Join-Path $vsPath Common7\Tools\Microsoft.VisualStudio.DevShell.dll)
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64 -winsdk=10.0.26100.0"
          if (-not (Test-Path "LLVM-21.1.3-win64-MultiThreadedDLL")) {
            $uri = "https://github.com/WasmEdge/llvm-windows/releases/download/llvmorg-21.1.3/LLVM-21.1.3-win64-MultiThreadedDLL.zip"
            $llvm = "LLVM-21.1.3-win64-MultiThreadedDLL.zip"
            Invoke-WebRequest -Uri $uri -HttpVersion 2.0 -OutFile $llvm
            Expand-Archive -Path $llvm
          }
          $llvm_dir = "$pwd\LLVM-21.1.3-win64-MultiThreadedDLL\LLVM-21.1.3-win64\lib\cmake\llvm"
          $cmake_sys_version = "10.0.26100.0"
          cmake -Bbuild -GNinja -DCMAKE_BUILD_TYPE=Release -DCMAKE_SYSTEM_VERSION="$cmake_sys_version" -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreadedDLL -DCMAKE_POLICY_DEFAULT_CMP0141=NEW -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded -DLLVM_DIR:PATH="$llvm_dir" -DWASMEDGE_BUILD_TESTS="$Env:build_tests" -DWASMEDGE_BUILD_PACKAGE=ZIP .
          cmake --build build
      - name: Test WasmEdge
        run: |
          $vsPath = (vswhere -latest -property installationPath)
          Import-Module (Join-Path $vsPath Common7\Tools\Microsoft.VisualStudio.DevShell.dll)
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64 -winsdk=10.0.26100.0"
          $Env:PATH += ";$pwd\build\lib\api"
          cd build
          tools\wasmedge\wasmedge -v
          ctest --output-on-failure
          cd -
      - name: Create WasmEdge package
        run: |
          $vsPath = (vswhere -latest -property installationPath)
          Import-Module (Join-Path $vsPath Common7\Tools\Microsoft.VisualStudio.DevShell.dll)
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64 -winsdk=10.0.26100.0"
          cmake --build build --target package
          Get-ChildItem -Path $pwd\build
      - name: Generate product version and package Windows installer
        run: |
          $Env:product_version = ("${{ inputs.version }}").split("-")[0]
          . $Env:WIX\bin\candle.exe -arch x64 -o build\wasmedge.wixobj .github\scripts\wasmedge.wxs
          . $Env:WIX\bin\light.exe -out build\WasmEdge-$Env:product_version-windows-msvc.msi build\wasmedge.wixobj
          echo product_version=$Env:product_version | Out-File -FilePath $Env:GITHUB_ENV -Encoding utf8 -Append
      - name: Upload artifact
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: WasmEdge-${{ inputs.version }}-windows-msvc.zip
          path: build\\WasmEdge-${{ inputs.version }}-Windows.zip
      - name: Upload Windows installer
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: WasmEdge-${{ env.product_version }}-windows-msvc.msi
          path: build\\WasmEdge-${{ env.product_version }}-windows-msvc.msi
      - name: Upload Windows 10 zip package
        if: ${{ inputs.release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv build\\WasmEdge-${{ inputs.version }}-Windows.zip WasmEdge-${{ inputs.version }}-windows-msvc.zip
          gh release upload ${{ inputs.version }} WasmEdge-${{ inputs.version }}-windows-msvc.zip --clobber
      - name: Upload Windows installer
        if: ${{ inputs.release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mv build\\WasmEdge-${{ env.product_version }}-windows-msvc.msi WasmEdge-${{ env.product_version }}-windows-msvc.msi
          gh release upload ${{ inputs.version }} WasmEdge-${{ env.product_version }}-windows-msvc.msi --clobber
